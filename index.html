<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crane</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="under-development">Under Development</h1>
    <div class="scene" id="scene">
        <canvas id="ropeCanvas"></canvas>
        <div class="rail"></div>
        <div class="trolley" id="trolley"></div>
        <div class="claw" id="claw">
            <div class="claw-head"></div>
            <div class="claw-fingers">
                <div class="finger left"></div>
                <div class="finger right"></div>
            </div>
        </div>
        <div class="drop-zone" id="dropZone">
            <span class="drop-zone-label">drop here</span>
        </div>
        <div class="crate" data-page="about.html"><span class="crate-label">About</span></div>
        <div class="crate" data-page="projects.html"><span class="crate-label">Projects</span></div>
        <div class="crate" data-page="contact.html"><span class="crate-label">Contact</span></div>
        <div class="crate" data-page="resume.html"><span class="crate-label">Resume</span></div>
    </div>
    <div class="controls">
        <div class="control-pad">
            <div class="control-top">
                <button class="control-btn control-up" data-key="ArrowUp" title="Raise rope">▲</button>
                <button class="control-btn control-down" data-key="ArrowDown" title="Lower rope">▼</button>
            </div>
            <div class="control-bottom">
                <button class="control-btn control-left" data-key="ArrowLeft" title="Move left">◄</button>
                <button class="control-btn control-grab" data-action="grab" title="Grab / Drop">GRAB</button>
                <button class="control-btn control-right" data-key="ArrowRight" title="Move right">►</button>
            </div>
        </div>
    </div>
    <p class="hint">&#8592; &#8594;&nbsp; move &nbsp;&nbsp; &#8593; &#8595;&nbsp; raise / lower &nbsp;&nbsp; SPACE&nbsp; grab / drop &nbsp;&nbsp;·&nbsp;&nbsp; drop into zone to navigate</p>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
